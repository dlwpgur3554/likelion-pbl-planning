  <line x1="60" y1="870" x2="1740" y2="870" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="60" y="890" font-size="10" fill="#666" font-family="'Noto Sans CJK KR', monospace">1️⃣ GPT 응답 로딩 스피너 · 2️⃣ 글자수 카운터 (500자 한도) · 3️⃣ 블록 hover 상태 + 편집 아이콘 · 4️⃣ 편집 모달 명세</text>
  <text x="1740" y="890" font-size="10" fill="#666" text-anchor="end" font-family="'Noto Sans CJK KR', monospace">개선안 02 / P0 / 예상 임팩트 ★★★</text>

