    <text x="600" y="195" font-size="14" fill="#666" text-anchor="middle">↓</text>

    <!-- Action block (HOVER STATE 표시) -->
    <rect x="415" y="205" width="370" height="60" fill="#f4f4ef" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="415" y="205" width="60" height="60" fill="#1a1a1a"/>
    <text x="445" y="240" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">액션</text>
    <text x="490" y="230" font-size="11" font-weight="600" fill="#1a1a1a">3분할 매수</text>
    <text x="490" y="250" font-size="10" fill="#666">자본 30% / 분할 2h</text>
    <rect x="740" y="225" width="30" height="20" fill="#1a1a1a"/>
    <text x="755" y="240" font-size="9" fill="#fff" text-anchor="middle" font-weight="600">✏️ 편집</text>
    <text x="490" y="285" font-size="9" fill="#666" font-style="italic">← hover 상태 · 클릭 시 편집 모달 열림</text>

    <text x="600" y="315" font-size="14" fill="#666" text-anchor="middle">↓</text>

    <rect x="415" y="325" width="370" height="60" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="415" y="325" width="60" height="60" fill="#1a1a1a"/>
    <text x="445" y="360" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">손절</text>
    <text x="490" y="350" font-size="11" font-weight="600" fill="#1a1a1a">-3% 시 정리</text>
    <rect x="740" y="345" width="30" height="20" fill="none" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="2 1"/>
    <text x="755" y="359" font-size="9" fill="#666" text-anchor="middle">✏️ 편집</text>

    <!-- ★ NEW: Edit modal preview (dim) -->
