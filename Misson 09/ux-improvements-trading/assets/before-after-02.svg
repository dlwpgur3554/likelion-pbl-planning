    <text x="820" y="240" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">?</text>

    <text x="600" y="295" font-size="14" fill="#666" text-anchor="middle">↓</text>

    <rect x="415" y="305" width="370" height="60" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="415" y="305" width="60" height="60" fill="#1a1a1a"/>
    <text x="445" y="340" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">손절</text>
    <text x="490" y="330" font-size="11" font-weight="600" fill="#1a1a1a">-3% 시 정리</text>

    <text x="20" y="565" font-size="9" fill="#666" font-style="italic">P2: "블록 클릭해도 아무 일도 안 일어남" (오조작 3회)</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(895, 550)">
    <text x="0" y="10" font-size="24" fill="#1a1a1a" text-anchor="middle">→</text>
    <text x="0" y="40" font-size="10" fill="#666" text-anchor="middle" font-family="'Noto Sans CJK KR', monospace">IMPROVE</text>
