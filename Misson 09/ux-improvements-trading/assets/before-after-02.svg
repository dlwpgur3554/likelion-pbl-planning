    <text x="445" y="145" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">트리거</text>
    <text x="490" y="135" font-size="11" font-weight="600" fill="#1a1a1a">가격 변동 조건</text>
    <text x="490" y="155" font-size="10" fill="#666">BTC ─5% (24h)</text>

    <text x="600" y="195" font-size="14" fill="#666" text-anchor="middle">↓</text>

