    <text x="345" y="257" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>

    <circle cx="290" cy="498" r="12" fill="#1a1a1a"/>
    <text x="290" y="503" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">2</text>

    <circle cx="770" cy="235" r="12" fill="#1a1a1a"/>
    <text x="770" y="240" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">3</text>

