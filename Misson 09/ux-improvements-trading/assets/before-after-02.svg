<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" width="1800" height="900" font-family="'Noto Sans CJK KR', sans-serif">

  <rect width="1800" height="900" fill="#fafaf7"/>

  <!-- Header -->
  <text x="60" y="60" font-size="11" fill="#666" letter-spacing="1.5" font-family="'Noto Sans CJK KR', monospace">BEFORE / AFTER · IMPROVEMENT 02</text>
  <text x="60" y="92" font-size="26" font-weight="600" fill="#1a1a1a" letter-spacing="-0.5">개선안 2: GPT 전략 화면 어포던스 강화 (W3)</text>
  <text x="1740" y="60" font-size="10" fill="#666" text-anchor="end" font-family="'Noto Sans CJK KR', monospace">PRIORITY: P0</text>
  <text x="1740" y="76" font-size="10" fill="#666" text-anchor="end" font-family="'Noto Sans CJK KR', monospace">작성자: 이제혁</text>
  <line x1="60" y1="115" x2="1740" y2="115" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Rationale strip -->
  <g transform="translate(60, 140)">
    <rect width="1680" height="80" fill="#1a1a1a"/>
    <text x="20" y="28" font-size="10" fill="#ccc" font-family="'Noto Sans CJK KR', monospace" letter-spacing="1.5">DATA-DRIVEN RATIONALE</text>
    <text x="20" y="52" font-size="13" fill="#fafaf7">📊 W3 누적 멈춤 <tspan font-weight="700">52초 (전체 최대)</tspan> · T3 완료율 <tspan font-weight="700">66% (김주형 실패)</tspan> · P1/P2 발화 "이거 누르면 뭐가 뜨나요?" · GPT 응답 대기 5-7초 무피드백</text>
    <text x="20" y="70" font-size="11" fill="#ccc">🎯 성공 목표: W3 멈춤 <tspan font-weight="700">52초 → 20초 이하</tspan> · T3 완료율 <tspan font-weight="700">66% → 100%</tspan></text>
  </g>

  <!-- ============ BEFORE ============ -->
  <text x="60" y="260" font-size="14" fill="#666" font-family="'Noto Sans CJK KR', monospace" letter-spacing="1.5">◄ BEFORE (현재)</text>

  <g transform="translate(60, 280)">
    <rect width="820" height="560" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>

