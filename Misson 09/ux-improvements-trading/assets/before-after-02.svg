    <text x="425" y="485" font-size="10" fill="#666">분할 횟수: [_3_]회</text>
    <rect x="425" y="500" width="60" height="22" fill="#1a1a1a"/>
    <text x="455" y="514" font-size="10" fill="#fff" text-anchor="middle">저장</text>

