    <rect x="415" y="205" width="60" height="60" fill="#1a1a1a"/>
    <text x="445" y="240" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">액션</text>
    <text x="490" y="230" font-size="11" font-weight="600" fill="#1a1a1a">3분할 매수</text>
    <text x="490" y="250" font-size="10" fill="#666">자본 30% / 분할 2h</text>

    <!-- ⚠️ 문제 지점: 클릭 어포던스 없음 -->
