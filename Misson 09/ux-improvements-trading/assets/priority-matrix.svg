    <!-- Sprint 1 -->
    <text x="30" y="90" font-size="14" fill="#fafaf7" font-weight="700">🚀 Sprint 1 (즉시, 1주)</text>
    <text x="30" y="112" font-size="11" fill="#ccc">Quick Wins 4개 · Impact 최대</text>

    <text x="50" y="140" font-size="11" fill="#fafaf7">✓ I1 비수탁 신뢰 배너</text>
    <text x="50" y="160" font-size="11" fill="#fafaf7">✓ I2 자산 위젯 라벨</text>
    <text x="50" y="180" font-size="11" fill="#fafaf7">✓ I3 GPT 로딩 인디케이터</text>
    <text x="50" y="200" font-size="11" fill="#fafaf7">✓ I4 블록 hover 상태</text>

    <text x="380" y="90" font-size="14" fill="#fafaf7" font-weight="700">예상 결과</text>
    <text x="380" y="115" font-size="10" fill="#ccc">• H2 정답률 33% → 90%+</text>
    <text x="380" y="133" font-size="10" fill="#ccc">• T3 완료율 66% → 100%</text>
    <text x="380" y="151" font-size="10" fill="#ccc">• W3 멈춤 52초 → 20초 이하</text>
    <text x="380" y="169" font-size="10" fill="#ccc">• 총 개발 시간 ~16시간</text>

    <line x1="30" y1="230" x2="610" y2="230" stroke="#666" stroke-width="0.5"/>

    <!-- Sprint 2 -->
    <text x="30" y="265" font-size="14" fill="#fafaf7" font-weight="700">📈 Sprint 2 (권장, 2-3주)</text>
    <text x="30" y="287" font-size="11" fill="#ccc">Major Projects 3개 · UX 완성도</text>

    <text x="50" y="315" font-size="11" fill="#fafaf7">✓ I5 블록 편집 모달</text>
    <text x="50" y="335" font-size="11" fill="#fafaf7">✓ I6 벤치마크 비교선</text>
    <text x="50" y="355" font-size="11" fill="#fafaf7">✓ I7 KPI hover 툴팁</text>

    <text x="380" y="265" font-size="14" fill="#fafaf7" font-weight="700">예상 결과</text>
    <text x="380" y="290" font-size="10" fill="#ccc">• 자신감 있는 배포 결정</text>
    <text x="380" y="308" font-size="10" fill="#ccc">• 초보자 이해도 상승</text>
    <text x="380" y="326" font-size="10" fill="#ccc">• 신뢰성 강화</text>
    <text x="380" y="344" font-size="10" fill="#ccc">• 총 개발 시간 ~40시간</text>

    <line x1="30" y1="390" x2="610" y2="390" stroke="#666" stroke-width="0.5"/>

    <!-- Sprint 3 -->
    <text x="30" y="425" font-size="14" fill="#fafaf7" font-weight="700">🎯 Sprint 3 (차후, 여유 시)</text>
    <text x="30" y="447" font-size="11" fill="#ccc">Fill-ins 2개 · 파워유저 개선</text>

    <text x="50" y="475" font-size="11" fill="#fafaf7">○ I8 글자수 카운터</text>
    <text x="50" y="495" font-size="11" fill="#fafaf7">○ I9 Cmd+Enter 단축키</text>

    <text x="380" y="425" font-size="14" fill="#fafaf7" font-weight="700">예상 결과</text>
    <text x="380" y="450" font-size="10" fill="#ccc">• 파워유저 만족도 상승</text>
    <text x="380" y="468" font-size="10" fill="#ccc">• 총 개발 시간 ~4시간</text>

    <line x1="30" y1="530" x2="610" y2="530" stroke="#666" stroke-width="0.5"/>

    <text x="30" y="565" font-size="10" fill="#ccc" font-family="'Noto Sans CJK KR', monospace" letter-spacing="1.5">TOTAL IMPROVEMENTS</text>
    <text x="30" y="600" font-size="32" fill="#fafaf7" font-weight="700">9개</text>
    <text x="120" y="605" font-size="11" fill="#ccc">P0: 4  ·  P1: 3  ·  P2: 2</text>

    <text x="30" y="640" font-size="10" fill="#ccc">Sprint 1만 완료해도 <tspan font-weight="700" fill="#fafaf7">전체 임팩트의 65%</tspan> 확보</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="1050" x2="1740" y2="1050" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="60" y="1075" font-size="10" fill="#666" font-family="'Noto Sans CJK KR', monospace">PRIORITY MATRIX · 데이터 기반 개선안 9개 · Impact × Effort 축으로 우선순위 결정</text>
  <text x="1740" y="1075" font-size="10" fill="#666" text-anchor="end" font-family="'Noto Sans CJK KR', monospace">작성자: 이제혁 / PBL WK09</text>

</svg>
