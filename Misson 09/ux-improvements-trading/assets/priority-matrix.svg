<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" width="1800" height="1100" font-family="'Noto Sans CJK KR', sans-serif">

  <rect width="1800" height="1100" fill="#fafaf7"/>

  <!-- Header -->
  <text x="60" y="60" font-size="11" fill="#666" letter-spacing="1.5" font-family="'Noto Sans CJK KR', monospace">MISSION 09 / PRIORITY MATRIX</text>
  <text x="60" y="92" font-size="26" font-weight="600" fill="#1a1a1a" letter-spacing="-0.5">개선안 우선순위 매트릭스 (Impact × Effort)</text>
  <text x="1740" y="60" font-size="10" fill="#666" text-anchor="end" font-family="'Noto Sans CJK KR', monospace">9 IMPROVEMENTS · P0-P2</text>
  <text x="1740" y="76" font-size="10" fill="#666" text-anchor="end" font-family="'Noto Sans CJK KR', monospace">작성자: 이제혁</text>
  <line x1="60" y1="115" x2="1740" y2="115" stroke="#1a1a1a" stroke-width="2"/>

  <!-- ============ Matrix ============ -->
  <g transform="translate(60, 150)">

    <!-- Quadrant background -->
    <rect x="80" y="60" width="900" height="720" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>

    <!-- Grid lines -->
    <line x1="530" y1="60" x2="530" y2="780" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="80" y1="420" x2="980" y2="420" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Quadrant labels -->
    <text x="305" y="90" font-size="11" fill="#1a1a1a" font-weight="700" text-anchor="middle" font-family="'Noto Sans CJK KR', monospace">QUICK WINS (즉시)</text>
    <text x="305" y="108" font-size="9" fill="#666" text-anchor="middle">임팩트 ↑ · 노력 ↓</text>

    <text x="755" y="90" font-size="11" fill="#1a1a1a" font-weight="700" text-anchor="middle" font-family="'Noto Sans CJK KR', monospace">MAJOR PROJECTS (계획)</text>
    <text x="755" y="108" font-size="9" fill="#666" text-anchor="middle">임팩트 ↑ · 노력 ↑</text>

    <text x="305" y="450" font-size="11" fill="#666" font-weight="600" text-anchor="middle" font-family="'Noto Sans CJK KR', monospace">FILL-INS (여유시)</text>
    <text x="305" y="468" font-size="9" fill="#666" text-anchor="middle">임팩트 ↓ · 노력 ↓</text>

    <text x="755" y="450" font-size="11" fill="#666" font-weight="600" text-anchor="middle" font-family="'Noto Sans CJK KR', monospace">THANKLESS (재검토)</text>
    <text x="755" y="468" font-size="9" fill="#666" text-anchor="middle">임팩트 ↓ · 노력 ↑</text>

    <!-- Axis labels -->
    <text x="530" y="810" font-size="12" fill="#1a1a1a" font-weight="600" text-anchor="middle">개발 노력 →</text>
    <text x="70" y="420" font-size="12" fill="#1a1a1a" font-weight="600" text-anchor="middle" transform="rotate(-90 70 420)">사용자 임팩트 →</text>

    <!-- Axis endpoints -->
    <text x="80" y="800" font-size="10" fill="#666">낮음</text>
    <text x="980" y="800" font-size="10" fill="#666" text-anchor="end">높음</text>
    <text x="60" y="775" font-size="10" fill="#666">낮음</text>
    <text x="60" y="70" font-size="10" fill="#666">높음</text>

    <!-- ============ Data points ============ -->
    <!-- P0 items (Quick Wins area) -->
    <!-- I1: 비수탁 배너 (매우 임팩트↑, 노력↓) -->
    <circle cx="200" cy="150" r="26" fill="#1a1a1a"/>
    <text x="200" y="147" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">I1</text>
    <text x="200" y="160" font-size="8" fill="#fff" text-anchor="middle">P0</text>
    <text x="238" y="150" font-size="11" fill="#1a1a1a" font-weight="600">비수탁 신뢰 배너</text>
    <text x="238" y="163" font-size="9" fill="#666">CSS 추가만 · 인지율 +57%p</text>

    <!-- I2: 자산 위젯 라벨 (임팩트 매우 높음, 노력 매우 낮음) -->
    <circle cx="160" cy="200" r="26" fill="#1a1a1a"/>
    <text x="160" y="197" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">I2</text>
    <text x="160" y="210" font-size="8" fill="#fff" text-anchor="middle">P0</text>
    <text x="200" y="200" font-size="11" fill="#1a1a1a" font-weight="600">자산 위젯 "업비트 보관" 라벨</text>
    <text x="200" y="213" font-size="9" fill="#666">텍스트 1줄 추가 · H2 검증 실패 해소</text>

    <!-- I3: GPT 로딩 인디케이터 (임팩트↑↑, 노력↓) -->
    <circle cx="220" cy="260" r="26" fill="#1a1a1a"/>
    <text x="220" y="257" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">I3</text>
    <text x="220" y="270" font-size="8" fill="#fff" text-anchor="middle">P0</text>
    <text x="258" y="260" font-size="11" fill="#1a1a1a" font-weight="600">GPT 응답 로딩 인디케이터</text>
    <text x="258" y="273" font-size="9" fill="#666">스피너 컴포넌트 · P1 발화 "답답함" 해소</text>

    <!-- I4: 블록 hover 상태 (임팩트↑, 노력↓) -->
    <circle cx="300" cy="320" r="26" fill="#1a1a1a"/>
    <text x="300" y="317" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">I4</text>
    <text x="300" y="330" font-size="8" fill="#fff" text-anchor="middle">P0</text>
    <text x="338" y="320" font-size="11" fill="#1a1a1a" font-weight="600">블록 hover 상태 + 편집 아이콘</text>
    <text x="338" y="333" font-size="9" fill="#666">CSS + 아이콘 · T3 완료율 66→100%</text>

