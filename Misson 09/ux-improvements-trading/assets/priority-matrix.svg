    <!-- I5: 블록 편집 모달 (임팩트↑, 노력↑↑) -->
    <circle cx="710" cy="230" r="26" fill="#1a1a1a" fill-opacity="0.55"/>
    <text x="710" y="227" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">I5</text>
    <text x="710" y="240" font-size="8" fill="#fff" text-anchor="middle">P1</text>
    <text x="748" y="230" font-size="11" fill="#1a1a1a" font-weight="600">블록 편집 모달 신규 개발</text>
    <text x="748" y="243" font-size="9" fill="#666">신규 컴포넌트 · P2 오조작 3회 해소</text>

    <!-- I6: 벤치마크 라인 (임팩트↑, 노력 중) -->
    <circle cx="620" cy="290" r="26" fill="#1a1a1a" fill-opacity="0.55"/>
    <text x="620" y="287" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">I6</text>
    <text x="620" y="300" font-size="8" fill="#fff" text-anchor="middle">P1</text>
    <text x="658" y="290" font-size="11" fill="#1a1a1a" font-weight="600">벤치마크 비교선 (Equity Curve)</text>
    <text x="658" y="303" font-size="9" fill="#666">BTC 시세 데이터 파이프라인 필요</text>

    <!-- I7: KPI 툴팁 (임팩트 중, 노력↓) -->
    <circle cx="250" cy="380" r="26" fill="#1a1a1a" fill-opacity="0.55"/>
    <text x="250" y="377" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">I7</text>
    <text x="250" y="390" font-size="8" fill="#fff" text-anchor="middle">P1</text>
    <text x="288" y="380" font-size="11" fill="#1a1a1a" font-weight="600">KPI 카드 hover 툴팁</text>
    <text x="288" y="393" font-size="9" fill="#666">tooltip 컴포넌트 · P3 발화 "MDD?" 해소</text>

    <!-- Fill-ins (P2) -->
    <!-- I8: 글자수 카운터 -->
    <circle cx="220" cy="520" r="24" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
    <text x="220" y="517" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="700">I8</text>
    <text x="220" y="530" font-size="8" fill="#1a1a1a" text-anchor="middle">P2</text>
    <text x="256" y="520" font-size="11" fill="#1a1a1a" font-weight="600">글자수 카운터 (500자)</text>
    <text x="256" y="533" font-size="9" fill="#666">P3 발화 "뭐라고 써야?" · 완만한 개선</text>

    <!-- I9: Cmd+Enter 단축키 -->
    <circle cx="300" cy="600" r="24" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
    <text x="300" y="597" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="700">I9</text>
    <text x="300" y="610" font-size="8" fill="#1a1a1a" text-anchor="middle">P2</text>
    <text x="336" y="600" font-size="11" fill="#1a1a1a" font-weight="600">Cmd+Enter 단축키 지원</text>
    <text x="336" y="613" font-size="9" fill="#666">파워유저용 · 3명 중 1명(P2)만 시도</text>

    <!-- Origin markers -->
    <circle cx="80" cy="780" r="4" fill="#1a1a1a"/>
    <circle cx="980" cy="60" r="4" fill="#1a1a1a"/>

  </g>

  <!-- ============ Legend & Summary ============ -->
  <g transform="translate(1100, 200)">
    <rect width="640" height="670" fill="#1a1a1a"/>

